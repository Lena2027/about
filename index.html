<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모듈화된 HTML 데모</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- 동적으로 로드될 헤더 -->
    <div id="header-container"></div>

    <main>
        <h1>메인 콘텐츠 영역</h1>
        <p>이곳은 메인 페이지의 내용이 들어가는 부분입니다. 헤더와 푸터는 각각 별도의 파일에서 불러와 표시됩니다.</p>

        <section id="affiliate-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xgoljwgl" method="POST">
                <div class="form-group">
                    <label for="name">이름/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="이름 또는 업체명을 입력하세요.">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" required placeholder="제휴 관련 내용을 상세히 적어주세요."></textarea>
                </div>
                <!-- 폼 제출 후 이동할 페이지 (선택사항) -->
                <!-- <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html"> -->
                <button type="submit">문의하기</button>
            </form>
        </section>
    </main>

    <!-- 동적으로 로드될 푸터 -->
    <div id="footer-container"></div>

    <script src="js/main.js"></script>
</body>

</html>
