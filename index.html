<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Calendar & Inquiry</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="header-container"></div>

    <main>
        <section id="hero">
            <h1>Minimal Calendar & Contact</h1>
            <p>A simple way to check German holidays and get in touch.</p>
        </section>

        <section id="calendar-section">
            <h2>German Holidays 2026</h2>
            <div id="calendar-controls">
                <div class="state-selector">
                    <label for="stateSelect">Region:</label>
                    <select id="stateSelect">
                        <option value="ALL" selected>All Germany</option>
                        <option value="BW">Baden-Württemberg</option>
                        <option value="BY">Bayern</option>
                        <option value="BE">Berlin</option>
                        <option value="BB">Brandenburg</option>
                        <option value="HB">Bremen</option>
                        <option value="HH">Hamburg</option>
                        <option value="HE">Hessen</option>
                        <option value="MV">Mecklenburg-Vorpommern</option>
                        <option value="NI">Niedersachsen</option>
                        <option value="NW">Nordrhein-Westfalen</option>
                        <option value="RP">Rheinland-Pfalz</option>
                        <option value="SL">Saarland</option>
                        <option value="SN">Sachsen</option>
                        <option value="ST">Sachsen-Anhalt</option>
                        <option value="SH">Schleswig-Holstein</option>
                        <option value="TH">Thüringen</option>
                    </select>
                </div>
                <div class="month-nav">
                    <button id="prevMonth">Prev</button>
                    <span id="currentMonthDisplay"></span>
                    <button id="nextMonth">Next</button>
                </div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div id="holiday-list">
                <h3>Holidays this month</h3>
                <ul id="holidays"></ul>
            </div>
        </section>

        <section id="affiliate-form">
            <h2>Contact Us</h2>
            <form action="https://formspree.io/f/xgoljwgl" method="POST">
                <div class="form-group">
                    <input type="text" id="name" name="name" required placeholder="Name or Company">
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="_replyto" required placeholder="Email Address">
                </div>
                <div class="form-group">
                    <textarea id="message" name="message" rows="4" required placeholder="How can we help?"></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
</body>

</html>
